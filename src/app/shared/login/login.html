<div class="bg-slate-50 min-h-[85vh] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-10">
      
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-200">
          <img src="/images/logo.png" class="h-6 w-auto brightness-0 invert" alt="Logo">
        </div>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Acceso al Sistema</h2>
        <p class="text-slate-400 text-sm mt-1 font-medium">Ingresa tus credenciales para continuar</p>
      </div>

      <div *ngIf="errorLogin" 
           class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl flex items-center animate-in fade-in slide-in-from-top-2 duration-300">
        <svg class="w-5 h-5 text-red-500 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm text-red-800 font-medium italic">Usuario o contraseña incorrectos.</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="space-y-6">
        
        <div>
          <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400 mb-2 block ml-1">Correo Electrónico</label>
          <input 
            formControlName="email" 
            type="email" 
            placeholder="admin@books.com"
            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:bg-white outline-none transition-all placeholder:text-slate-300 text-slate-700"
            [ngClass]="{'border-red-300 bg-red-50/30': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
          
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-[10px] text-red-500 font-bold mt-1 ml-2 uppercase tracking-wider">
            Formato de correo inválido
          </p>
        </div>

        <div>
          <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400 mb-2 block ml-1">Contraseña</label>
          <input 
            formControlName="password" 
            type="password" 
            placeholder="••••••••"
            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:bg-white outline-none transition-all text-slate-700"
            [ngClass]="{'border-red-300 bg-red-50/30': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
          
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-[10px] text-red-500 font-bold mt-1 ml-2 uppercase tracking-wider">
            Mínimo 6 caracteres
          </p>
        </div>

        <div class="pt-2">
          <button 
            type="submit" 
            [disabled]="loginForm.invalid"
            class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-xl shadow-blue-600/20 transition-all transform active:scale-[0.97] disabled:bg-slate-200 disabled:shadow-none disabled:text-slate-400 disabled:cursor-not-allowed">
            Iniciar Sesión
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
