<div class="max-w-6xl mx-auto p-6 bg-slate-50 min-h-screen">

    <h1 class="text-3xl font-extrabold text-slate-800 mb-8 border-b-4 border-blue-600 inline-block uppercase">
        Gestión de Catálogo - Books
    </h1>

    <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 mb-10">
        <h2 class="text-xl font-bold text-slate-700 mb-4">Registrar Nuevo Libro</h2>
        <form (ngSubmit)="guardarLibro()" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <div class="flex flex-col">
                <input [(ngModel)]="libro.titulo" name="titulo" type="text" placeholder="Título del libro" required
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <input [(ngModel)]="libro.autor" name="autor" type="text" placeholder="Autor" required
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <input [(ngModel)]="libro.anio" name="anio" type="number" placeholder="Año (Ej: 2024)" required
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <input [(ngModel)]="libro.precio" name="precio" type="number" placeholder="Precio ($)" required
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button type="submit"
                class="md:col-span-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-200">
                {{editando ? 'Actualizar Libro': 'Guardar en Catálogo'}}
            </button>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-800 text-slate-100">
                <tr>
                    <th class="p-4 font-semibold uppercase text-xs">Acciones</th>
                    <th class="p-4 font-semibold uppercase text-xs">Título</th>
                    <th class="p-4 font-semibold uppercase text-xs">Autor</th>
                    <th class="p-4 font-semibold uppercase text-xs">Año</th>
                    <th class="p-4 font-semibold uppercase text-xs">Precio</th>
                </tr>
            </thead>
            <tbody>
                @for (item of listaLibros(); track item.id) {
                <tr class="border-b border-slate-100 hover:bg-blue-50 transition-colors">
                    <td class="p-4 text-slate-600 flex gap-2">
                        <button (click)="eliminar(item.id!)" title="Eliminar">🗑️</button>
                        <button (click)="editar(item)" title="Editar">📝</button>
                    </td>
                    <td class="p-4 text-slate-800 font-bold uppercase">{{ item.titulo }}</td>
                    <td class="p-4 text-slate-600 italic">{{ item.autor }}</td>
                    <td class="p-4 text-slate-600">{{ item.anio }}</td>
                    <td class="p-4 text-blue-700 font-mono font-bold">
                        {{ item.precio | currency:'USD' }}
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="5" class="p-8 text-center text-slate-400 italic">
                        No hay libros registrados en el catálogo.
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
