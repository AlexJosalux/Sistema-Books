<div class="max-w-2xl mx-auto mt-10 p-8 bg-white shadow-xl rounded-2xl border border-gray-100">
  <div class="mb-8 border-b border-gray-100 pb-4">
    <h2 class="text-3xl font-extrabold text-gray-800">
      Añadir Libro
    </h2>
    <p class="text-gray-500 mt-2">Completa la información para registrar.</p>
  </div>

  <form [formGroup]="formularioLibro" (ngSubmit)="guardarLibro()" class="space-y-6">
    
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Título del Libro</label>
      <input 
        type="text" 
        formControlName="titulo"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
        placeholder="Ej: Crónica de una muerte anunciada"
        [class.border-red-500]="formularioLibro.get('titulo')?.invalid && formularioLibro.get('titulo')?.touched">
      
      <p *ngIf="formularioLibro.get('titulo')?.invalid && formularioLibro.get('titulo')?.touched" class="text-red-500 text-xs mt-1 italic">
        El título es obligatorio y debe tener al menos 3 caracteres.
      </p>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Autor</label>
      <input 
        type="text" 
        formControlName="autor"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        placeholder="Nombre del autor"
        [class.border-red-500]="formularioLibro.get('autor')?.invalid && formularioLibro.get('autor')?.touched">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Año de Publicación</label>
      <input 
        type="number" 
        formControlName="anio"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        placeholder="Ej: 2024"
        [class.border-red-500]="formularioLibro.get('anio')?.invalid && formularioLibro.get('anio')?.touched">
      
      <p *ngIf="formularioLibro.get('anio')?.invalid && formularioLibro.get('anio')?.touched" class="text-red-500 text-xs mt-1 italic">
        El año es obligatorio y debe ser mayor a 1900.
      </p>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Precio (USD)</label>
      <div class="relative">
        <span class="absolute left-4 top-3.5 text-gray-400 font-bold">$</span>
        <input 
          type="number" 
          formControlName="precio"
          class="w-full pl-8 pr-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
          placeholder="0.00"
          [class.border-red-500]="formularioLibro.get('precio')?.invalid && formularioLibro.get('precio')?.touched">
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción / Resumen</label>
      <textarea 
        formControlName="descripcion"
        rows="3"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        placeholder="Breve reseña del libro..."></textarea>
    </div>

    <div class="flex items-center space-x-4 pt-6">
      <button 
        type="submit" 
        [disabled]="formularioLibro.invalid"
        class="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95">
        Guardar en Inventario
      </button>

      <a 
        routerLink="/libros"
        class="px-6 py-3.5 border border-gray-300 text-gray-600 font-semibold rounded-xl hover:bg-gray-50 transition-all">
        Cancelar
      </a>
    </div>

  </form>
</div>
